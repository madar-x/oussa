<head>

<title>Dr. Moutasem</title>
  <link rel="icon" href="https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/6bddfed09378cddade2091f970c741/6a346abc3b653671db9328b0/sh_1781820172688.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-image-light: url('https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/6bddfed09378cddade2091f970c741/6a346abc3b653671db9328b0/sh_1781820172354.jpg');
    --bg-image-dark: url('https://surveyheartmedia.s3.ap-south-1.amazonaws.com/files/6bddfed09378cddade2091f970c741/6a346abc3b653671db9328b0/sh_1781820172987.jpg');
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #f0ede8;
    --muted: #8a8070;
    --glow: rgba(201, 168, 76, 0.356);
    --name-grad-1: var(--accent2);
    --name-grad-2: #fff;
    --name-grad-3: var(--accent);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    transition: background-color 0.4s ease;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -2;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    opacity: 0;
    transition: opacity 0.9s ease, transform 0.9s ease;
    transform: scale(1.02);
    pointer-events: none;
  }
  .bg-layer.light-bg {
    background-image: var(--bg-image-light);
    opacity: 1;
    transform: scale(1);
  }
  .bg-layer.dark-bg {
    background-image: var(--bg-image-dark);
  }
  body.dark .bg-layer.light-bg {
    opacity: 0;
    transform: scale(0.98);
  }
  body.dark .bg-layer.dark-bg {
    opacity: 1;
    transform: scale(1);
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(100,80,200,0.07) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(201,168,76,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0.95;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.08), transparent 24%),
      radial-gradient(circle at 80% 25%, rgba(255,255,255,0.06), transparent 24%),
      radial-gradient(circle at 50% 80%, rgba(0,0,0,0.08), transparent 48%);
    opacity: 0.38;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 48px 24px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    z-index: 100;
    backdrop-filter: blur(12px);
    transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .theme-toggle:hover { transform: scale(1.03); border-color: rgba(201,168,76,0.45); }
  .theme-btn {
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 20px;
    color: var(--text);
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .theme-btn.rotate {
    animation: rotateIcon 0.5s ease;
  }
  @keyframes rotateIcon {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(180deg) scale(1.05); }
    100% { transform: rotate(360deg); }
  }
  .theme-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 55%);
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .theme-btn:hover { transform: scale(1.08); background: rgba(255,255,255,0.14); }
  .theme-btn:hover::before { opacity: 1; transform: scale(1); }
  .theme-btn.active {
    box-shadow: 0 0 0 1px rgba(201,168,76,0.45), 0 10px 30px rgba(0,0,0,0.2);
    animation: bounce 0.8s ease;
  }
  .theme-btn.sun { color: #f4b109; }
  .theme-btn.moon { color: #d4d8ff; }
  @keyframes bounce {
    0% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-4px) scale(1.1); }
    100% { transform: translateY(0) scale(1); }
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease both;
  }
  .avatar-ring {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent), transparent 50%, var(--accent2));
    position: relative;
    z-index: 1;
    box-shadow: 0 0 36px rgba(255,215,0,0.32), 0 0 80px rgba(201,168,76,0.08);
    animation: pulseGlow 2.8s ease-in-out infinite;
    will-change: box-shadow, transform;
  }
  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.2);
    animation: spin 8s linear infinite;
  }
  @keyframes pulseGlow {
    0%, 100% {
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.18);
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.35);
      transform: scale(1.02);
    }
  }
  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1830, #0d0d1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    overflow: hidden;
    cursor: pointer;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
    transition: transform 0.35s ease;
    transform-origin: center center;
  }
  .avatar-wrap:hover .avatar-inner img,
  .avatar-inner:hover img {
    transform: scale(1.12);
  }
  .avatar-crown {
    position: absolute;
    top: 7px;
    left: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    color: #ffd700;
    transform: rotate(-45deg);
    z-index: 0;
    width: auto;
    height: auto;
    padding: 0;
    background: none;
    border: none;
    box-shadow: none;
  }
  .avatar-badge {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 1.1rem;
    border: 2.5px solid var(--border);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    opacity: 1;
    transform: translateY(0) scale(1);
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 3;
    pointer-events: auto;
  }

  .avatar-wrap:hover .avatar-badge {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* Name & title */
  .profile-name {
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 900;
    text-align: center;
    letter-spacing: -0.5px;
    background: linear-gradient(45deg, var(--text), var(--accent) 50%, var(--text));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .profile-title {
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.2s ease both;
    font-weight: 300;
  }

  /* Divider */
  .divider {
    width: 360px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.25s ease both;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    cursor: pointer;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glow), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .link-btn:hover {
    transform: translateY(-2px) scale(1.01);
    border-color: rgba(201,168,76,0.3);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.1);
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: scale(0.98); }

  .link-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    overflow: hidden;
    animation: platformGlow 3.5s ease-in-out infinite;
  }
  .link-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: 0 0 0 rgba(255,255,255,0.0);
    opacity: 0;
    animation: iconFlash 3.5s infinite ease-in-out;
  }
  .link-icon img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
  }
  @keyframes platformGlow {
    0%, 100% {
      box-shadow: 0 0 0 transparent;
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 28px var(--platform-glow, rgba(255,255,255,0.4));
      transform: scale(1.02);
    }
  }
  @keyframes iconFlash {
    0%, 80%, 100% {
      box-shadow: 0 0 0 rgba(255,255,255,0);
      opacity: 0;
      transform: scale(1);
    }
    85% {
      box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 35px rgba(255,255,255,0.4);
      opacity: 1;
      transform: scale(1.08);
    }
    90% {
      box-shadow: 0 0 30px rgba(255,255,255,0.75), 0 0 50px rgba(255,255,255,0.45);
      opacity: 0.95;
      transform: scale(1.12);
    }
  }

  .link-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }
  .link-label {
    font-size: 15px;
    font-weight: 700;
    display: block;
    letter-spacing: 0.2px;
  }
  .link-sublabel {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
    font-weight: 300;
  }

  .link-arrow {
    color: #29ace4c1;
    font-size: 20px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s, color 0.3s;
  }
  .link-btn:hover .link-arrow { transform: translateX(-4px); color: var(--accent); }

  /* Platform colors */
  .icon-facebook { background: rgba(24,119,242,0.15); --platform-glow: rgba(24,119,242,0.35); }
  .icon-instagram { background: rgba(225,48,108,0.15); --platform-glow: rgba(225,48,108,0.35); }
  .icon-whatsapp { background: rgba(37,211,102,0.15); --platform-glow: rgba(37,211,102,0.35); }
  .icon-telegram { background: rgba(0,136,204,0.15); --platform-glow: rgba(0,136,204,0.35); }
  .icon-tiktok { background: rgba(255,0,80,0.1); --platform-glow: rgba(255,0,80,0.3); }
  .icon-youtube { background: rgba(255,0,0,0.15); --platform-glow: rgba(255,0,0,0.35); }
  .icon-linkedin { background: rgba(0,136,204,0.15); --platform-glow: rgba(0,136,204,0.35); }
  .icon-snapchat { background: rgba(255,252,0,0.15); --platform-glow: rgba(255,252,0,0.35); }
  
  /* Colored right-side accent lines */
  .link-btn::after {
    content: '';
    position: absolute;
    right: 0;
    top: 12%;
    height: 76%;
    width: 4px;
    border-radius: 4px 0 0 4px;
    transition: height 0.3s ease, top 0.3s ease, opacity 0.3s;
    opacity: 0.7;
  }
  .link-btn:hover::after { height: 88%; top: 6%; opacity: 1; }

  .btn-facebook::after { background: #1877f2; }
  .btn-instagram::after { background: linear-gradient(180deg, #f58529, #dd2a7b, #8134af); }
  .btn-whatsapp::after { background: #25d366; }
  .btn-telegram::after { background: #0088cc; }
  .btn-tiktok::after   { background: linear-gradient(180deg, #ff0050, #00f2ea); }
  .btn-linkedin::after { background: #0088cc;}
  .btn-snapchat::after { background: #fffc00; }

  /* Staggered animation */
  .link-btn:nth-child(1) { animation: fadeUp 0.7s 0.3s ease both; }
  .link-btn:nth-child(2) { animation: fadeUp 0.7s 0.38s ease both; }
  .link-btn:nth-child(3) { animation: fadeUp 0.7s 0.46s ease both; }
  .link-btn:nth-child(4) { animation: fadeUp 0.7s 0.54s ease both; }
  .link-btn:nth-child(5) { animation: fadeUp 0.7s 0.62s ease both; }
  .link-btn:nth-child(6) { animation: fadeUp 0.7s 0.7s ease both; }
  .link-btn:nth-child(7) { animation: fadeUp 0.7s 0.78s ease both;}
  
  /* Footer */
  .footer {
    margin-top: 40px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: fadeUp 0.8s 0.8s ease both;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Light mode (visuals isolated) */
  body.light {
    --bg: var(--bg-image-light);
    --surface: rgba(0,0,0,0.04);
    --border: rgba(0,0,0,0.08);
    --text: #1a1612;
    --muted: #7a7060;
    --glow: rgba(201,168,76,0.1);
    --name-grad-1: #d4b896;
    --name-grad-2: #000;
    --name-grad-3: #8b6f47;
  }
  body.light::before {
    background:
      radial-gradient(ellipse 60% 50% at 50% -10%, rgba(201,168,76,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(150,130,200,0.1) 0%, transparent 50%);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0.95;
  }

  body.light .avatar-inner { background: linear-gradient(135deg, #e8e0d0, #d5c8b0); }
  body.light .profile-title { color: rgba(26, 22, 18, 0.95); }

  /* Dark mode (separate overrides) */
  body.dark {
    --bg: var(--bg-image-dark);
   --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.05);
    --text: #f0ede8;
    --muted: #8a8070;
    --glow: rgba(201,168,76,0.28);
    --name-grad-1: var(--accent2);
    --name-grad-2: #fff;
    --name-grad-3: var(--accent);
  }
  body.dark::before {
    background:
      radial-gradient(ellipse 60% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(100,80,200,0.07) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(201,168,76,0.06) 0%, transparent 50%);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0.95;
  }
  body.dark .avatar-inner { background: linear-gradient(135deg, #1a1830, #0d0d1a); }
</style>
</head>

<script>
  const themeButton = document.querySelector('.theme-btn');
  const body = document.body;
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

  function setTheme(theme) {
    const isDark = theme === 'dark';
    body.classList.toggle('dark', isDark);
    body.classList.toggle('light', !isDark);
    themeButton.textContent = isDark ? '🌙' : '☀️';
    themeButton.title = isDark ? 'الوضع الداكن' : 'الوضع الفاتح';
    themeButton.setAttribute('aria-label', isDark ? 'تبديل إلى الوضع الفاتح' : 'تبديل إلى الوضع الداكن');
    themeButton.classList.toggle('moon', isDark);
    themeButton.classList.toggle('sun', !isDark);
  }

  function saveTheme(theme) {
    localStorage.setItem('preferredTheme', theme);
  }

  function loadTheme() {
    return localStorage.getItem('preferredTheme');
  }

  function getInitialTheme() {
    const saved = loadTheme();
    if (saved === 'dark' || saved === 'light') {
      return saved;
    }
    return prefersDark.matches ? 'dark' : 'light';
  }

  function toggleTheme() {
    const current = body.classList.contains('dark') ? 'dark' : 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    setTheme(next);
    saveTheme(next);
  }

  themeButton.addEventListener('click', () => {
    body.classList.add('theme-transition');
    window.clearTimeout(body.dataset.transitionTimeout);
    body.dataset.transitionTimeout = window.setTimeout(() => body.classList.remove('theme-transition'), 500);
    themeButton.classList.remove('rotate');
    void themeButton.offsetWidth;
    themeButton.classList.add('rotate');
    toggleTheme();
  });

  prefersDark.addEventListener('change', (event) => {
    if (!loadTheme()) {
      setTheme(event.matches ? 'dark' : 'light');
    }
  });

  setTheme(getInitialTheme());
</script>
